services:
  - type: web
    name: ismap
    runtime: docker
    rootDir: .
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ismap-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: RECOVERY_ADMINS_JSON
        sync: false

databases:
  - name: ismap-db
    plan: free
