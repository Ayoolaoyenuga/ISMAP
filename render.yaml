services:
  - type: web
    name: ismap-backend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.12
      - key: DATABASE_URL
        fromDatabase:
          name: ismap-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: RECOVERY_ADMINS_JSON
        sync: false

databases:
  - name: ismap-db
    plan: free
